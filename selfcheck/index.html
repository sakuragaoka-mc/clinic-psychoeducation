      --green: #81c784;
      --green-dark: #66bb6a;

      --blue-light: #e3f2fd;

      --radius: 16px;
      --radius-sm: 12px;
      --font: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--cream);

    .fade-enter {

    .fade-enter-active {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s ease;

    @media (min-width: 600px) {
      #root { padding: 32px 24px 60px; }

</head>

        ],
        conditions: [

          { name: "心身症", desc: "心理的なストレスが体の症状として現れる状態です。" },

      {

        description: "朝になると体が動かない、行こうとすると体調が悪くなる",
        color: "#e3f2fd",
        symptoms: [
          "朝になると体が動かず、起き上がれない",
          "仕事や学校のことを考えると気分が悪くなる",
          "玄関を出ようとすると体調が悪くなる",
          "遅刻や欠勤・欠席が増えてきた",
          "「行かなければ」と思うほどつらくなる",
          "休みの日は比較的元気に過ごせる",
          "このままではいけないと焦りを感じる",
          "周りの人に申し訳ないと感じる",
          "家にいても罪悪感で休めない",
          "この状態が2週間以上続いている"
        ],
        conditions: [
          { name: "うつ病", desc: "気力の低下により日常生活に支障が出ている可能性があります。" },
          { name: "適応障害", desc: "職場や学校の環境ストレスが原因で心身の不調が出ている状態です。" },
          { name: "不安障害", desc: "特定の場面への強い不安が日常生活に影響を与えている状態です。" }
        ]
      }
    ];

    /* ========== コンポーネント ========== */

    function FadeIn({ children }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        el.classList.add("fade-enter");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            el.classList.add("fade-enter-active");
          });
        });
      }, []);
      return <div ref={ref}>{children}</div>;
    }

    /* --- 画面1: トップ --- */
    function TopScreen({ onSelect }) {
      return (
        <FadeIn>
          <div style={styles.header}>
            <div style={styles.headerIcon}>🍀</div>
            <h1 style={styles.headerTitle}>最近、こんなことありませんか？</h1>
            <p style={styles.headerSub}>
              気になる項目をタップして、<br />
              今のこころの状態をチェックしてみましょう。
            </p>
          </div>

          <div style={styles.cardGrid}>
            {categories.map(cat => (
              <button
                key={cat.id}
                style={{ ...styles.card, backgroundColor: cat.color }}
                onClick={() => onSelect(cat)}
                onMouseEnter={e => {
                  e.currentTarget.style.transform = "translateY(-3px)";
                  e.currentTarget.style.boxShadow = "var(--shadow-hover)";
                }}
                onMouseLeave={e => {
                  e.currentTarget.style.transform = "translateY(0)";
                  e.currentTarget.style.boxShadow = "var(--shadow)";
                }}
              >
                <span style={styles.cardIcon}>{cat.icon}</span>
                <span style={styles.cardTitle}>{cat.title}</span>
                <span style={styles.cardDesc}>{cat.description}</span>
              </button>
            ))}
          </div>

          <p style={styles.footerNote}>
            🔒 このチェックの結果は保存されません。<br />
            安心してご利用ください。
          </p>
        </FadeIn>
      );
    }

    /* --- 画面2: 症状チェック --- */
    function CheckScreen({ category, onBack, onResult }) {
      const [checked, setChecked] = useState({});

      const toggle = (idx) => {
        setChecked(prev => ({ ...prev, [idx]: !prev[idx] }));
      };

      const checkedCount = Object.values(checked).filter(Boolean).length;

      return (
        <FadeIn>
          <button style={styles.backBtn} onClick={onBack}>
            ← カテゴリ選択に戻る
          </button>

          <div style={{ ...styles.checkHeader, backgroundColor: category.color }}>
            <span style={{ fontSize: "2rem" }}>{category.icon}</span>
            <h2 style={styles.checkTitle}>{category.title}</h2>
            <p style={styles.checkSub}>
              あてはまるものにチェックを入れてください。
            </p>
          </div>

          <div style={styles.checkList}>
            {category.symptoms.map((symptom, idx) => {
              const isLast = idx === category.symptoms.length - 1;
              return (
                <label
                  key={idx}
                  style={{
                    ...styles.checkItem,
                    ...(checked[idx] ? styles.checkItemActive : {}),
                    ...(isLast ? styles.checkItemLast : {})
                  }}
                >
                  <input
                    type="checkbox"
                    checked={!!checked[idx]}
                    onChange={() => toggle(idx)}
                    style={styles.checkbox}
                  />
                  <span style={styles.checkLabel}>{symptom}</span>
                </label>
              );
            })}
          </div>

          <div style={styles.checkFooter}>
            <p style={styles.checkedCount}>
              {checkedCount}件 選択中
            </p>
            <button
              style={{
                ...styles.resultBtn,
                ...(checkedCount === 0 ? styles.resultBtnDisabled : {})
              }}
              disabled={checkedCount === 0}
              onClick={() => onResult(checkedCount)}
            >
              結果を見る
            </button>
          </div>
        </FadeIn>
      );
    }

    /* --- 画面3: 結果 --- */
    function ResultScreen({ category, checkedCount, onReset }) {
      const total = category.symptoms.length;
      let level, levelColor, levelBg, message, advice;

      if (checkedCount <= 3) {
        level = "軽度";
        levelColor = "#66bb6a";
        levelBg = "#e8f5e9";
        message = "今のところ大きな心配はなさそうですが、気になることがあれば遠慮なくご相談ください。";
        advice = "日常のセルフケア（十分な睡眠、適度な運動、リラックスする時間）を大切にしましょう。";
      } else if (checkedCount <= 6) {
        level = "中度";
        levelColor = "#ffa726";
        levelBg = "#fff3e0";
        message = "少しお疲れが溜まっているかもしれません。一人で抱え込まず、専門家に相談してみませんか？";
        advice = "早めに専門家へ相談することで、症状が軽いうちに対処できることが多いです。";
      } else {
        level = "要注意";
        levelColor = "#ef5350";
        levelBg = "#ffebee";
        message = "おつらい状況が続いているようですね。一人で頑張りすぎないでください。専門の医療機関への相談をおすすめします。";
        advice = "できるだけ早めに専門の医療機関を受診されることをおすすめします。適切な治療で楽になれることがたくさんあります。";
      }

      return (
        <FadeIn>
          {/* 免責事項 */}
          <div style={styles.disclaimer}>
            <p style={styles.disclaimerText}>
              ⚠️ このチェックは医学的な診断ではありません。気になる症状がある場合は、必ず専門の医療機関を受診してください。
            </p>
          </div>

          {/* 結果サマリー */}
          <div style={{ ...styles.resultCard, borderColor: levelColor }}>
            <div style={{ ...styles.levelBadge, backgroundColor: levelBg, color: levelColor }}>
              {level}
            </div>
            <p style={styles.resultCategory}>
              {category.icon} {category.title}
            </p>
            <p style={styles.resultScore}>
              {total}項目中 <strong>{checkedCount}項目</strong> に該当
            </p>
            <p style={styles.resultMessage}>{message}</p>
            <p style={styles.resultAdvice}>{advice}</p>
          </div>

          {/* 該当する可能性のある疾患 */}
          <div style={styles.conditionSection}>
            <h3 style={styles.sectionTitle}>💡 関連する可能性のある状態</h3>
            <p style={styles.conditionNote}>
              ※ 以下は一般的な情報であり、診断ではありません。
            </p>
            {category.conditions.map((cond, idx) => (
              <div key={idx} style={styles.conditionCard}>
                <h4 style={styles.conditionName}>{cond.name}</h4>
                <p style={styles.conditionDesc}>{cond.desc}</p>
              </div>
            ))}
          </div>

          {/* 治療法の説明 */}
          <div style={styles.treatmentSection}>
            <h3 style={styles.sectionTitle}>🏥 主な治療法について</h3>

            <div style={styles.treatmentCard}>
              <h4 style={styles.treatmentName}>💊 薬物療法</h4>
              <p style={styles.treatmentDesc}>
                症状に合わせたお薬を使って治療します。保険適用で、自己負担は月1,500〜2,500円程度が目安です。
              </p>
            </div>

            <div style={styles.treatmentCard}>
              <h4 style={styles.treatmentName}>🗣️ 心理療法（カウンセリング）</h4>
              <p style={styles.treatmentDesc}>
                専門のカウンセラーと対話を通じて、考え方や行動パターンを見直していきます。自費で1回5,000〜10,000円程度です。
              </p>
            </div>
          </div>

          {/* 保険診療の注意点 */}
          <div style={styles.insuranceBox}>
            <h4 style={styles.insuranceTitle}>⚠️ 日本の保険診療について</h4>
            <p style={styles.insuranceText}>
              精神科・心療内科の診察は保険適用です。ただしカウンセリング（心理療法）は多くの場合自費となります。まずは医師の診察をお勧めします。
            </p>
          </div>

          {/* 寄り添いメッセージ */}
          <div style={styles.encourageBox}>
            <p style={styles.encourageText}>
              🌸 一人で抱え込まないでくださいね。<br />
              相談することは、とても勇気ある一歩です。
            </p>
          </div>

          {/* CTAボタン */}
          <div style={styles.ctaSection}>
            <a href={CLINIC_URL} style={styles.ctaBtn}>
              当クリニックに相談する
            </a>
            <button style={styles.retryBtn} onClick={onReset}>
              もう一度チェックする
            </button>
          </div>
        </FadeIn>
      );
    }

    /* --- メインApp --- */
    function App() {
      const [screen, setScreen] = useState("top");
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [checkedCount, setCheckedCount] = useState(0);

      const handleSelect = (cat) => {
        setSelectedCategory(cat);
        setScreen("check");
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const handleBack = () => {
        setScreen("top");
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const handleResult = (count) => {
        setCheckedCount(count);
        setScreen("result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const handleReset = () => {
        setSelectedCategory(null);
        setCheckedCount(0);
        setScreen("top");
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      return (
        <div>
          {screen === "top" && <TopScreen onSelect={handleSelect} />}
          {screen === "check" && (
            <CheckScreen
              category={selectedCategory}
              onBack={handleBack}
              onResult={handleResult}
            />
          )}
          {screen === "result" && (
            <ResultScreen
              category={selectedCategory}
              checkedCount={checkedCount}
              onReset={handleReset}
            />
          )}
        </div>
      );
    }

    /* ========== スタイル ========== */

      /* ヘッダー */
      header: {
        textAlign: "center",

        lineHeight: 1.7,
      },

      /* カードグリッド */
      cardGrid: {
        display: "grid",
        gridTemplateColumns: "1fr 1fr",
        gap: "12px",
      },
      card: {
        display: "flex",
        flexDirection: "column",

        gap: "6px",
        padding: "18px 16px",
        borderRadius: "var(--radius)",
        border: "none",
        boxShadow: "var(--shadow)",
        cursor: "pointer",
        textAlign: "left",
        fontFamily: "var(--font)",
        transition: "transform 0.2s ease, box-shadow 0.2s ease",
      },
      cardIcon: {
        fontSize: "1.8rem",
      },
      cardTitle: {
        fontSize: "0.9rem",
        fontWeight: 700,
        color: "var(--text)",
        lineHeight: 1.5,
      },
      cardDesc: {
        fontSize: "0.75rem",
        color: "var(--text-light)",
        lineHeight: 1.6,
      },

      /* フッター注 */
