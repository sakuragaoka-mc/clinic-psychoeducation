<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マインドフルネス - こころのクリニック桜が丘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/variables.css">
  <link rel="stylesheet" href="../shared/css/reset.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <link rel="stylesheet" href="css/mindfulness.css">
</head>
<body>
  <div class="page">
    <!-- ヘッダー -->
    <header class="mindfulness-header">
      <div class="container">
        <div class="header-petals" aria-hidden="true">
          <span class="petal petal-1"></span>
          <span class="petal petal-2"></span>
          <span class="petal petal-3"></span>
        </div>
        <h1 class="header-title">マインドフルネス</h1>
        <p class="header-subtitle">
          <a href="https://www.mental-clinic-sakuragaoka.com" target="_blank" rel="noopener" style="color: inherit; text-decoration: none;">こころのクリニック桜が丘</a>
        </p>
        <p class="header-desc">
          心を穏やかに保つためのツールを<br>
          ご用意しました。
        </p>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="page-content">
      <div class="container">

        <!-- 機能カード -->
        <div class="feature-cards">
          <a href="meditation.html" class="card card--action feature-card">
            <div class="card-icon" style="background: var(--color-primary-100); color: var(--color-primary-500);">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <h2 class="card-title">瞑想タイマー</h2>
            <p class="card-desc">
              ガイド付きの瞑想で、心を落ち着けましょう。3分から20分まで、あなたのペースで。
            </p>
            <span class="card-arrow" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </span>
          </a>

          <a href="mood-tracker.html" class="card card--action feature-card">
            <div class="card-icon" style="background: var(--color-accent-100); color: var(--color-accent-500);">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
              </svg>
            </div>
            <h2 class="card-title">気分記録</h2>
            <p class="card-desc">
              毎日の気分を記録して、心の変化を見える化。自分のパターンを知ることが回復の第一歩です。
            </p>
            <span class="card-arrow" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </span>
          </a>

          <a href="education.html" class="card card--action feature-card">
            <div class="card-icon" style="background: #eef4fb; color: var(--color-info);">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
              </svg>
            </div>
            <h2 class="card-title">心理教育</h2>
            <p class="card-desc">
              マインドフルネスの基礎知識や呼吸法を学びましょう。日常で実践できるヒントが満載です。
            </p>
            <span class="card-arrow" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </span>
          </a>
        </div>

      </div>
    </main>

    <!-- フッター -->
    <footer class="site-footer">
      <div class="container">
        <p class="site-footer-brand">こころのクリニック桜が丘</p>
        <nav class="site-footer-links">
          <a href="https://www.mental-clinic-sakuragaoka.com" target="_blank" rel="noopener">クリニックHP</a>
          <a href="../psychoeducation/index.html" target="_blank" rel="noopener">こころの学び</a>
          <a href="../patient-portal/index.html">患者ポータル</a>
          <a href="meditation.html">瞑想タイマー</a>
          <a href="mood-tracker.html">気分記録</a>
          <a href="education.html">心理教育</a>
        </nav>
        <p class="site-footer-copy">
          &copy; こころのクリニック桜が丘
        </p>
      </div>
    </footer>
  </div>
</body>
</html>
