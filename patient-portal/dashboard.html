<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - マイページ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/variables.css">
  <link rel="stylesheet" href="../shared/css/reset.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
  <div class="page">
    <!-- ナビゲーション -->
    <nav class="navbar">
      <span class="navbar-title">ダッシュボード</span>
      <button class="logout-btn" id="logoutBtn">ログアウト</button>
    </nav>

    <main class="page-content portal-page-content">
      <div class="container">

        <!-- 挨拶 -->
        <div class="dashboard-header">
          <h1 class="dashboard-greeting" id="greeting"></h1>
          <p class="dashboard-date" id="todayDate"></p>
        </div>

        <!-- 次の予約 -->
        <div class="next-appointment-card" id="nextAppointment">
          <h3>次の予約</h3>
          <div id="nextAppointmentContent">
            <p class="text-sm" style="opacity: 0.8;">予約はありません</p>
          </div>
        </div>

        <!-- クイックリンク -->
        <div class="section">
          <h2 class="section-title">メニュー</h2>
          <div class="quick-links">
            <a href="appointments.html" class="quick-link">
              <div class="quick-link-icon" style="background: var(--color-primary-100); color: var(--color-primary-500);">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
              </div>
              <span class="quick-link-label">予約一覧</span>
            </a>
            <a href="notifications.html" class="quick-link">
              <div class="quick-link-icon" style="background: #eef4fb; color: var(--color-info);">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
              </div>
              <span class="quick-link-label">お知らせ<span id="notifBadge" class="unread-badge" style="margin-left: 4px; display: none;"></span></span>
            </a>
            <a href="../mindfulness/index.html" class="quick-link">
              <div class="quick-link-icon" style="background: var(--color-accent-100); color: var(--color-accent-500);">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
              </div>
              <span class="quick-link-label">マインドフルネス</span>
            </a>
            <a href="https://www.mental-clinic-sakuragaoka.com" target="_blank" rel="noopener" class="quick-link">
              <div class="quick-link-icon" style="background: var(--color-neutral-100); color: var(--color-neutral-500);">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
              </div>
              <span class="quick-link-label">クリニックHP</span>
            </a>
            <a href="../psychoeducation/index.html" target="_blank" rel="noopener" class="quick-link">
              <div class="quick-link-icon" style="background: #eef4fb; color: #7bafd5;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
              </div>
              <span class="quick-link-label">こころの学び</span>
            </a>
            <a href="https://paa.digisma.com/p/mental-clinic-sakuragaoka" target="_blank" rel="noopener" class="quick-link">
              <div class="quick-link-icon" style="background: #e8f4fd; color: #3b9ed8;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>
                </svg>
              </div>
              <span class="quick-link-label">デジスマ予約・問診</span>
            </a>
          </div>
        </div>

      </div>
    </main>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="bottom-nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        ホーム
      </a>
      <a href="appointments.html" class="bottom-nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        予約
      </a>
      <a href="notifications.html" class="bottom-nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        お知らせ
        <span id="navNotifBadge" class="unread-badge" style="display: none;"></span>
      </a>
    </nav>
  </div>

  <script src="../shared/js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
