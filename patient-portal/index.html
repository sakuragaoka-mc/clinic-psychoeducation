<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - こころのクリニック桜が丘 マイページ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/variables.css">
  <link rel="stylesheet" href="../shared/css/reset.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <h1 class="login-title">マイページ</h1>
      <p class="login-subtitle">こころのクリニック桜が丘</p>

      <!-- ログインフォーム -->
      <form class="login-form" id="loginForm">
        <div id="loginError" class="login-error">
          ログインIDまたはパスワードが正しくありません。
        </div>

        <div class="input-group">
          <label for="patientId">ログインID</label>
          <input type="text" id="patientId" class="input" placeholder="登録時に設定したID" required autocomplete="username">
        </div>

        <div class="input-group">
          <label for="loginPassword">パスワード</label>
          <input type="password" id="loginPassword" class="input" placeholder="パスワード" required autocomplete="current-password">
        </div>

        <label class="toggle" style="justify-content: flex-start;">
          <input type="checkbox" id="rememberMe" checked>
          <span class="toggle-track"></span>
          <span class="toggle-label">ログイン状態を保持する</span>
        </label>

        <button type="submit" class="btn btn--primary btn--block btn--lg">
          ログイン
        </button>

        <p style="text-align:center; margin-top:0.75rem;">
          <button type="button" id="showResetBtn" class="btn btn--ghost" style="font-size: var(--text-xs); color: var(--color-neutral-400);">
            パスワードを忘れた方
          </button>
        </p>
      </form>

      <p style="text-align:center; margin-top:1rem;">
        <button id="showSignupBtn" class="btn btn--ghost" style="font-size: var(--text-sm); color: var(--color-primary-500);">
          はじめての方はこちら（新規登録）
        </button>
      </p>

      <!-- 新規登録フォーム -->
      <form class="login-form" id="signupForm" hidden>
        <h2 style="font-size: var(--text-lg); text-align:center; margin-bottom: var(--space-4); color: var(--color-neutral-800);">新規登録</h2>

        <div id="signupError" class="login-error"></div>
        <div id="signupSuccess" class="login-error" style="display:none; background: var(--color-accent-100); border-color: var(--color-accent-300); color: var(--color-accent-500);"></div>

        <div class="input-group">
          <label for="signupId">ログインID</label>
          <input type="text" id="signupId" class="input" placeholder="半角英数字で自由に設定（3文字以上）" required autocomplete="username">
        </div>

        <div class="input-group">
          <label for="signupPassword">パスワード</label>
          <input type="password" id="signupPassword" class="input" placeholder="6文字以上" required autocomplete="new-password">
        </div>

        <div class="input-group">
          <label for="signupPasswordConfirm">パスワード（確認）</label>
          <input type="password" id="signupPasswordConfirm" class="input" placeholder="もう一度入力" required autocomplete="new-password">
        </div>

        <div class="input-group">
          <label for="signupName">お名前</label>
          <input type="text" id="signupName" class="input" placeholder="例: 山田 太郎" required>
        </div>

        <div class="input-group">
          <label for="signupEmail">メールアドレス</label>
          <input type="email" id="signupEmail" class="input" placeholder="例: yamada@example.com" required autocomplete="email">
          <span style="font-size: var(--text-xs); color: var(--color-neutral-400);">パスワードリセットに使用します。</span>
        </div>

        <div class="input-group">
          <label for="signupBirthDate">生年月日</label>
          <input type="date" id="signupBirthDate" class="input" required>
        </div>

        <button type="submit" class="btn btn--primary btn--block btn--lg">
          登録する
        </button>

        <p style="text-align:center; margin-top:0.75rem;">
          <button type="button" id="showLoginBtn" class="btn btn--ghost" style="font-size: var(--text-sm); color: var(--color-neutral-400);">
            ログインに戻る
          </button>
        </p>
      </form>

      <!-- パスワードリセットフォーム -->
      <form class="login-form" id="resetForm" hidden>
        <h2 style="font-size: var(--text-lg); text-align:center; margin-bottom: var(--space-4); color: var(--color-neutral-800);">パスワードリセット</h2>

        <div id="resetError" class="login-error"></div>
        <div id="resetSuccess" class="login-error" style="display:none; background: var(--color-accent-100); border-color: var(--color-accent-300); color: var(--color-accent-500);"></div>

        <p style="font-size: var(--text-sm); color: var(--color-neutral-500); margin-bottom: var(--space-4); line-height: 1.7;">
          登録時のログインIDとメールアドレスを入力してください。確認が取れたら新しいパスワードを設定できます。
        </p>

        <div class="input-group">
          <label for="resetId">ログインID</label>
          <input type="text" id="resetId" class="input" placeholder="登録時に設定したID" required>
        </div>

        <div class="input-group">
          <label for="resetEmail">登録メールアドレス</label>
          <input type="email" id="resetEmail" class="input" placeholder="登録時のメールアドレス" required>
        </div>

        <div class="input-group" id="newPasswordGroup" hidden>
          <label for="resetNewPassword">新しいパスワード</label>
          <input type="password" id="resetNewPassword" class="input" placeholder="6文字以上" autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn--primary btn--block btn--lg" id="resetSubmitBtn">
          確認する
        </button>

        <p style="text-align:center; margin-top:0.75rem;">
          <button type="button" id="showLoginFromResetBtn" class="btn btn--ghost" style="font-size: var(--text-sm); color: var(--color-neutral-400);">
            ログインに戻る
          </button>
        </p>
      </form>

      <p class="login-privacy">
        お客様の個人情報は厳重に管理されています。<br>
        30分間操作がない場合、自動的にログアウトされます。
      </p>
    </div>

    <nav class="site-footer-links mt-4">
      <a href="/index.html">サイトトップ</a>
      <a href="https://www.mental-clinic-sakuragaoka.com" target="_blank" rel="noopener">クリニックHP</a>
      <a href="../psychoeducation/index.html" target="_blank" rel="noopener">こころの学び</a>
      <a href="../mindfulness/index.html">マインドフルネス</a>
    </nav>
  </div>

  <script src="../shared/js/storage.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
